version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: call-service-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  call-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: call-service
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3003
      JWT_SECRET: ${JWT_SECRET:-replace-with-strong-secret}
      REDIS_URL: redis://redis:6379
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-10000}
      RATE_LIMIT_MAX_MESSAGES: ${RATE_LIMIT_MAX_MESSAGES:-60}
      CALL_SESSION_TTL_SECONDS: ${CALL_SESSION_TTL_SECONDS:-86400}
    ports:
      - "3003:3003"
    restart: unless-stopped

volumes:
  redis_data:
